<!DOCTYPE html>
<html>

<head>
    <title>Format</title>
    <script>
        function onClickEmail() {
            debugger;
            let text = document.getElementById("txtId").value;
            if (text.includes("@") && text.includes(".") && (text.indexOf("@") < text.indexOf(".")) ) {
                alert("valid email");
            }
            else{
                alert("not valid email")
            }

        }
    </script>
</head>

<body>
    <header>
        <a href="../index.html">Back to Home</a>
    </header>
    <hr>
    <label>Email id</label>
    <input id="txtId">
    <button onclick="onClickEmail()">Valid or not</button>
</body>

</html>
