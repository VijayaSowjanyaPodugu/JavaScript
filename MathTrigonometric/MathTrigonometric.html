<!DOCTYPE html>
<html>

<head>
    <title>Trigonomteric</title>
    <script>
        function onClickSin(){
            debugger;
            let number=Number(document.getElementById("txtNum").value);
            let result=Math.sin(number * (Math.PI / 180));
            alert(result);
        }
         function onClickCos(){
            debugger;
            let number=Number(document.getElementById("txtNum").value);
            let result=Math.cos(number* Math.PI/180);
            alert(result);
        }
         function onClickTan(){
            debugger;
            let number=Number(document.getElementById("txtNum").value);
            let result=Math.tan(number*Math.PI/180);
            alert(result);
        }
        function onClickCot(){
            debugger;
            let number=Number(document.getElementById("txtNum").value);
            let result=1/Math.tan(number*Math.PI/180);
            alert(result);
        }
        function onClickCosec(){
            debugger;
            let number=Number(document.getElementById("txtNum").value);
            let result=1/Math.sin(number * (Math.PI / 180));
            alert(result);
        }
        function onClicksec(){
            debugger;
            let number=Number(document.getElementById("txtNum").value);
            let result=1/Math.cos(number* Math.PI/180);
            alert(result);
        }        
    </script>
</head>

    <button id="btn1" onclick="onClickCot()">cot</button>
