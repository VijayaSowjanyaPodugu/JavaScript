<!DOCTYPE html>
<html>
    <head>
        <title>Subtracion</title>
        <script>
            function onClickSubtraction(){
                let firstNumber=Number(document.getElementById("txtFirstNumber").value);
                let secondNumber=Number(document.getElementById("txtSecondNumber").value);
                let sum=firstNumber-secondNumber;
                alert(sum)
            }
        </script>
    </head>
    <body>
        <label>First Number</label>
        <input type="number" id="txtFirstNumber">
        <label>second Number</label>
        <input type="number" id="txtSecondNumber">
        <button id="btnsubmit" onclick="onClickSubtraction()">submit</button>
    </body>
</html>
