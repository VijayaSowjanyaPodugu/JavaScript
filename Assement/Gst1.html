<!DOCTYPE html>
<html>

<head>
    <title>GST SumsungS26</title>
    <script>
        function onClickGst() {
            debugger;
            let amount = Number(document.getElementById("txtAmount").value);
            let gst = Number(document.getElementById("txtGst").value);
            let total = Number(amount + (amount * gst / 100));
            alert(total);
        }

    </script>
</head>

<body>
    <header>
        <a href="../index.html">Back to Home</a>
    </header>
    <hr>
    <label>Amount</label>
    <input id="txtAmount">
    <label>Gst</label>
    <input id="txtGst">
    <button id="btnsubmit" onclick="onClickGst()">Submit</button>
</body>

</html>
