<!DOCTYPE html>
<html>
    <head>
        <title>Format</title>
        <script>
            function onClickEmail(){
                let text=document.getElementById("txtId").value;
                let result=text.toLowerCase().includes("@");
                alert(result);
            }
        </script>
    </head>
    <body>
<header>
<a href="../index.html">Back to Home</a>
</header>
<hr>
        <label>Email id</label>
        <input id="txtId">
        <button onclick="onClickEmail()">Valid or not</button>
    </body>
</html>
