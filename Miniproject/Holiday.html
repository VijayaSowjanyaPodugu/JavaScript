<!DOCTYPE html>
<html>
    <head>
        <title>holidays</title>
        <script>
            function onClickWeek(){
                let week=document.getElementById("txt").value;
                if(week=="sun" || week=="fri"){
                    alert("Holiday")
                }
                else{
                    alert("Working Days")
                }
            }
        </script>
    </head>
    <body>
        <label>Weeks</label>
        <input id="txt">
        <button onclick="onClickWeek()">check</button>
    </body>
</html>
