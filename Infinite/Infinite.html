<!DOCTYPE html>
<html>
    <head>
        <title>Infinite</title>
        <script>
            function onClickInfinite(){
                debugger;
                let inputNumber= Number(document.getElementById("txtInfinite").value);
                let result=Number.isFinite(inputNumber);
                alert(result);

            }
            function onClickNan(){
                let inputNumber= Number(document.getElementById("txtInfinite").value);
                let result=Number.isNaN(inputNumber);
                alert(result);

            }
             function onClickMax(){
                alert(Number.MAX_VALUE);

            }
              function onClickMin(){
                alert(Number.MIN_VALUE);

            }
             function onClickMaxSafeInteger(){
                alert(Number.MAX_SAFE_INTEGER);

            }
            function onClickMinSafeInteger(){
                alert(Number.MIN_SAFE_INTEGER);

            }
            

        </script>
    </head>
    <body>
        <Lable>Number</Lable>
        <input id="txtInfinite">
        <button id="btnsubmit" onclick="onClickInfinite()">Infinite</button>
        <button id="btnNan" onclick="onClickNan()">Nan</button>
        <button id="btnMax" onclick="onClickMax()">Number Properties max</button>
        <button id="btnMin" onclick="onClickMin()">Number Properties min</button>
        <button id="btnMaxSafe" onclick="onClickMaxSafeInteger()">Max Safe Integer</button>
         <button id="btnMinSafe" onclick="onClickMinSafeInteger()">Min Safe Integer</button>
    </body>
</html>
