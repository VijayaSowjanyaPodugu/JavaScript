<!DOCTYPE html>
<html>

<head>
    <title>Average 5 subjects</title>
    <script>
        function onClickAverage() {
            debugger;
            let english = Number(document.getElementById("txtEng").value);
            let sanskrit = Number(document.getElementById("txtSan").value);
            let telugu = Number(document.getElementById("txtTel").value);
            let hinid = Number(document.getElementById("txtHin").value);
            let math = Number(document.getElementById("txtMath").value);
            let sum = Number(telugu + hinid + english + math + sanskrit);
            let average = sum / 5;
            alert(average);
        }
    </script>
</head>

<body>
    <header>
        <a href="../index.html">Back to Home</a>
    </header>
    <hr>
    <label>English</label>
    <input id="txtEng"></inpuut>
    <label>Sanskrit</label>
    <input id="txtSan">
    <label>Telugu</label>
    <input id="txtTel">
    <label>Hinid</label>
    <input id="txtHin">
    <label>Math</label>
    <input id="txtMath">
    <button onclick="onClickAverage()">Result</button>

</body>

</html>
